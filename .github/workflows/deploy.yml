name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 640465964259.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build & Push Backend Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t 640465964259.dkr.ecr.ap-south-1.amazonaws.com/adhyayan-server:latest \
            --push .

      - name: Deploy on Backend EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to ECR on the server
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 640465964259.dkr.ecr.ap-south-1.amazonaws.com

            # 2. Pull and Restart
            docker pull 640465964259.dkr.ecr.ap-south-1.amazonaws.com/adhyayan-server:latest
            docker stop adhyayan-backend-container || true
            docker rm adhyayan-backend-container || true
            docker run -d -p 5000:5000 \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              --name adhyayan-backend-container \
              640465964259.dkr.ecr.ap-south-1.amazonaws.com/adhyayan-server:latest
